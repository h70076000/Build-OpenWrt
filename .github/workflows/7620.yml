name: Build-FanchmWrt-7620
on:
  repository_dispatch:
  workflow_dispatch:
permissions:
  contents: write
  actions: write
env:
  REPO_URL: https://github.com/h70076000/openwrt6
  REPO_BRANCH: openwrt-18.06
  FEEDS_CONF: FanchmWrt/18feeds.conf.default
  CONFIG_FILE: FanchmWrt/ar71.config
  DIY_P1_SH: FanchmWrt/diy-part1.sh
  DIY_P2_SH: FanchmWrt/diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 检测(Checkout)
        uses: actions/checkout@v4

      - name: 初始化环境(Initialization environment)
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-2004)
          sudo -E apt-get -qq install g++ build-essential libssl-dev libcurl4-openssl-dev wget
          sudo -E apt-get -qq install ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python2.7 python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 克隆源代码(Clone source code)
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH fanchmwrt
          ln -sf /workdir/fanchmwrt $GITHUB_WORKSPACE/fanchmwrt

      - name: 加载自定义订阅源(Load custom feeds)
        run: |
          [ -e $FEEDS_CONF ] && mv $FEEDS_CONF fanchmwrt/feeds.conf.default
          chmod +x $DIY_P1_SH
          cd fanchmwrt
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新软件源(Update feeds)
        run: cd fanchmwrt && ./scripts/feeds update -a

      - name: 安装软件源(Install feeds)
        run: cd fanchmwrt && ./scripts/feeds install -a

      - name: 加载自定义配置(Load custom configuration)
        run: |
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE fanchmwrt/.config
          chmod +x $DIY_P2_SH
          cd fanchmwrt
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: 提取固件默认管理IP（适配config_generate修改）
        id: extract_ip
        run: |
          cd fanchmwrt
          MANAGE_IP=""
          CONFIG_GENERATE="package/base-files/files/bin/config_generate"
          if [ -f "$CONFIG_GENERATE" ]; then
            MANAGE_IP=$(grep -oP '192\.168\.\d+\.\d+' "$CONFIG_GENERATE" | head -1)
          fi
          if [ -z "$MANAGE_IP" ] && [ -f "files/etc/config/network" ]; then
            MANAGE_IP=$(grep -A 10 'config interface 'lan'' "files/etc/config/network" | grep 'option ipaddr' | sed -r 's/.*ipaddr[[:space:]]*"(.*)"/\1/' | head -1)
          fi
          MANAGE_IP=${MANAGE_IP:-"192.168.1.1"}
          echo "MANAGE_IP=$MANAGE_IP" >> $GITHUB_ENV
          echo "✅ 提取到的管理IP（来自config_generate）：$MANAGE_IP"

      - name: 生成动态变量（编译时间/Release标签）
        id: gen_vars
        run: |
          COMPILE_TIME=$(date +"%Y-%m-%d %H:%M:%S")
          RELEASE_TAG=$(date +"%Y.%m.%d-%H%M")
          echo "COMPILE_TIME=$COMPILE_TIME" >> $GITHUB_ENV
          echo "RELEASE_TAG=$RELEASE_TAG" >> $GITHUB_ENV
          echo "✅ 生成的编译时间：$COMPILE_TIME"
          echo "✅ 生成的Release标签：$RELEASE_TAG"

      - name: 下载软件包(Download package)
        id: package
        run: |
          cd fanchmwrt
          make defconfig
          make download -j8
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;

      - name: 记录编译开始时间
        id: start_compile
        run: |
          COMPILE_START=$(date +%s)
          echo "COMPILE_START=$COMPILE_START" >> $GITHUB_ENV
          echo "✅ 编译开始时间戳：$COMPILE_START"

      - name: 编译固件(Compile the firmware)
        id: compile
        run: |
          cd fanchmwrt
          echo -e "$(nproc) thread compile"
          make -j$(nproc) || make -j1 || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          DEVICE=$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/')
          ARCH=$(grep '^CONFIG_TARGET_ARCH_PACKAGES=' .config | sed -r 's/.*="(.*)"/\1/')
          FULL_DEVICE_NAME="${DEVICE} ${ARCH}"
          [ -n "$DEVICE" ] && echo "DEVICE_NAME=_$DEVICE" >> $GITHUB_ENV
          echo "FULL_DEVICE_NAME=$FULL_DEVICE_NAME" >> $GITHUB_ENV
          echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 计算编译时长
        id: calc_duration
        if: steps.compile.outputs.status == 'success' && !cancelled()
        run: |
          COMPILE_END=$(date +%s)
          DURATION_SEC=$((COMPILE_END - COMPILE_START))
          HOURS=$((DURATION_SEC / 3600))
          MINUTES=$(((DURATION_SEC % 3600) / 60))
          SECONDS=$((DURATION_SEC % 60))
          COMPILE_DURATION=$(printf "%02d:%02d:%02d" $HOURS $MINUTES $SECONDS)
          echo "COMPILE_DURATION=$COMPILE_DURATION" >> $GITHUB_ENV
          echo "✅ 编译总耗时：$COMPILE_DURATION（H:M:S）"

      - name: 检查空间使用情况(Check space usage)
        run: df -hT

      - name: 上传 Bin 目录(Upload bin directory)
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true' && !cancelled()
        with:
          name: fanchmwrt_bin${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: fanchmwrt/bin

      - name: 整理文件(Organize files)
        id: organize
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          cd fanchmwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件目录(Upload firmware directory)
        uses: actions/upload-artifact@v4
        if: steps.compile.outputs.status == 'success' && steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: FanchmWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 读取集成插件信息
        id: plugins
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          if [ -f "$PLUGINS_FILE" ]; then
            PLUGINS_CONTENT=$(cat "$PLUGINS_FILE" | sed ':a;N;$!ba;s/\n/\\n/g')
            echo "PLUGINS_CONTENT=$PLUGINS_CONTENT" >> $GITHUB_ENV
          else
            echo "PLUGINS_CONTENT=暂无集成插件说明（可创建 $PLUGINS_FILE 文件添加）" >> $GITHUB_ENV
          fi

      - name: 重命名固件文件(Rename firmware file)
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          find "${{ env.FIRMWARE }}" -name "openwrt-*.*" -exec bash -c '
            for file do
              if [ -f "$file" ]; then
                new_file="${file/openwrt-/FanchmWrt-}"
                mv "$file" "$new_file"
                echo "✅ 固件文件重命名成功：$new_file"
              else
                echo "⚠️ 文件不存在，跳过：$file"
              fi
            done
          ' bash {} +

      # ========== 新增：获取固件列表并写入环境变量（邮件/Release共用） ==========
      - name: 获取固件列表（邮件/Release共用）
        id: get_fw_list
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          FW_LIST=""
          if [ -d "${{ env.FIRMWARE }}" ]; then
            FW_FILES=$(ls "${{ env.FIRMWARE }}"/FanchmWrt-*.* 2>/dev/null)
            if [ -n "$FW_FILES" ]; then
              for fw in $FW_FILES; do
                FW_LIST="$FW_LIST\n- $(basename "$fw")"
              done
            else
              FW_LIST="\n- 已编译固件：\n"
              ls "${{ env.FIRMWARE }}"/FanchmWrt-* 2>/dev/null | while read line; do
                FW_LIST="$FW_LIST  - $(basename "$line")"
              done
            fi
          else
            FW_LIST="\n- 未获取到固件目录"
          fi
          # 写入环境变量（处理换行符）
          echo "FIRMWARE_LIST=${FW_LIST}" >> $GITHUB_ENV
          echo "✅ 固件列表：$FW_LIST"

      - name: 生成发布标签(Generate release tag)
        id: tag
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        run: |
          echo "release_tag=${{ env.RELEASE_TAG }}" >> $GITHUB_OUTPUT
          echo "## FanchmWrt 固件编译自动发布" > release.txt
          echo "- 编译时间：${{ env.COMPILE_TIME }}" >> release.txt
          echo "- 编译时长：${{ env.COMPILE_DURATION }}（小时:分钟:秒）" >> release.txt
          echo "- 设备型号：${{ env.FULL_DEVICE_NAME }}" >> release.txt
          echo -e "\n### 🔐 默认登录信息" >> release.txt
          echo "- 管理IP：${{ env.MANAGE_IP }}（来自config_generate修改）" >> release.txt
          echo "- 登录账号：root" >> release.txt
          echo "- 登录密码：password" >> release.txt
          echo -e "\n### 📁 固件文件列表" >> release.txt
          if [ -d "${{ env.FIRMWARE }}" ]; then
            FW_FILES=$(ls "${{ env.FIRMWARE }}"/FanchmWrt-*.* 2>/dev/null)
            if [ -n "$FW_FILES" ]; then
              for fw in $FW_FILES; do
                echo "- $(basename "$fw")" >> release.txt
              done
            else
              echo "- 已编译固件：" >> release.txt
              ls "${{ env.FIRMWARE }}"/FanchmWrt-* 2>/dev/null | xargs -I {} echo "  - $(basename {})" >> release.txt
            fi
          fi
          echo -e "\n### 📦 集成插件信息" >> release.txt
          echo "${{ env.PLUGINS_CONTENT }}" | sed 's/\\n/\n/g' >> release.txt
          echo "status=success" >> $GITHUB_OUTPUT

      # ========== 修改：编译成功邮件添加固件列表 ==========
      - name: 编译成功邮件通知
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: FanchmWrt固件编译成功通知
          body: |
            您好，FanchmWrt固件编译已成功完成！
            关键信息如下：
            1. 编译时间：${{ env.COMPILE_TIME }}
            2. 编译时长：${{ env.COMPILE_DURATION }}（小时:分钟:秒）
            3. 设备型号：${{ env.FULL_DEVICE_NAME }}
            4. 固件管理IP：${{ env.MANAGE_IP }}
            5. 工作流ID：${{ github.run_id }}
            6. 固件文件列表：${{ env.FIRMWARE_LIST }}
            7. Release链接：https://github.com/${{ github.repository }}/releases/tag/${{ env.RELEASE_TAG }}
            8. 日志链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.RECEIVE_EMAIL }}
          from: GitHub Actions
          secure: true

      - name: 编译失败邮件通知
        if: failure() && steps.compile.conclusion == 'failure'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: FanchmWrt固件编译失败通知
          body: |
            您好，FanchmWrt固件编译工作流运行失败！
            仓库地址：${{ github.repository }}
            工作流运行ID：${{ github.run_id }}
            日志链接：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          to: ${{ secrets.RECEIVE_EMAIL }}
          from: GitHub Actions
          secure: true

      - name: 上传固件到 Release
        uses: softprops/action-gh-release@v1
        if: steps.compile.outputs.status == 'success' && steps.tag.outputs.status == 'success' && !cancelled()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: |
            ${{ env.FIRMWARE }}/FanchmWrt-*.*
            ${{ env.FIRMWARE }}/sha256sums
          overwrite: true

      - name: 删除运行的工作流(Delete workflow runs)
        uses: Mattraks/delete-workflow-runs@v2
        if: steps.compile.outputs.status == 'success' && !cancelled()
        with:
          retain_days: 0
          keep_minimum_runs: 2

      - name: 删除旧版本(Remove old Releases)
        uses: dev-drprasad/delete-older-releases@v0.3.0
        if: steps.compile.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
        with:
          keep_latest: 3
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
